# 2560x1440 ROI 校准参数。坐标一律为相对比例 [x, y, w, h](相对全帧宽高)。
# 数值基于 Valorant 默认 HUD 布局的公开参考(daseyun/valorant-timestamp-finder 思路),
# 首次使用请用 `vmontage calibrate <样例帧>` 核对并截取模板。
resolution: [2560, 1440]

# HUD 随分辨率等比缩放,相对坐标沿用 1080p 标定(真机验证前视为待核对)
rois:
  kill_feed: [0.700, 0.050, 0.300, 0.110]
  scoreboard_ally: [0.215, 0.016, 0.190, 0.058]
  scoreboard_enemy: [0.585, 0.016, 0.190, 0.058]
  # 顶部比分数字(回合切换检测:数字变了=新回合)
  score_ally: [0.410, 0.028, 0.032, 0.038]
  score_enemy: [0.565, 0.028, 0.032, 0.038]
  round_end_banner: [0.330, 0.170, 0.340, 0.130]
  center_flow: [0.375, 0.333, 0.250, 0.333]

templates:
  headshot_icon: headshot_icon_1440p.png
  round_won: round_won_1440p.png
  round_lost: round_lost_1440p.png
