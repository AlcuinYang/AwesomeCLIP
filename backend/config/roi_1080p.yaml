# 1920x1080 ROI 校准参数。坐标一律为相对比例 [x, y, w, h](相对全帧宽高)。
# Valorant HUD 随分辨率等比缩放,故与 1440p 相同的相对坐标可用作起点;
# 请用 `vmontage calibrate <样例帧>` 核对并截取该分辨率的模板。
resolution: [1920, 1080]

rois:
  kill_banner: [0.360, 0.780, 0.280, 0.095]
  scoreboard_ally: [0.290, 0.020, 0.155, 0.075]
  scoreboard_enemy: [0.555, 0.020, 0.155, 0.075]
  round_end_banner: [0.330, 0.170, 0.340, 0.130]
  center_flow: [0.375, 0.333, 0.250, 0.333]

templates:
  kill_banner: kill_banner_1080p.png
  death_banner: death_banner_1080p.png
  headshot_icon: headshot_icon_1080p.png
  round_won: round_won_1080p.png
  round_lost: round_lost_1080p.png
